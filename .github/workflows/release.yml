name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.0). Must already exist."
        required: true

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/ks"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/ks/release.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/ks/release.jks" >> "$GITHUB_ENV"

      - name: Assemble release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          ./gradlew --no-daemon assembleRelease \
            -PSTRAVA_SPOOF_KEYSTORE="$KEYSTORE_PATH" \
            -PSTRAVA_SPOOF_KEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PSTRAVA_SPOOF_KEY_ALIAS="$KEY_ALIAS" \
            -PSTRAVA_SPOOF_KEY_PASSWORD="$KEY_PASSWORD" \
            -Pgoogle.web.client.id="$GOOGLE_WEB_CLIENT_ID" \
            -Papi.base.url="$API_BASE_URL" \
            -Pgithub.repo="${{ github.repository }}"

      - name: Stage artifact with tag-derived name
        id: stage
        run: |
          SRC=app/build/outputs/apk/release/app-release.apk
          OUT="$RUNNER_TEMP/gps-simulator-${TAG}.apk"
          cp "$SRC" "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          files: ${{ steps.stage.outputs.apk }}
